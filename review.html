<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盘后复盘 · 三策略监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-base: #0a0a0f; --bg-elevated: #12121a; --bg-surface: #1a1a28;
  --bg-hover: #222236; --text-primary: #e8e8f0; --text-secondary: #a0a0b8;
  --text-muted: #606078; --border-subtle: rgba(255,255,255,0.06);
  --border-medium: rgba(255,255,255,0.10);
  --qixing: #3b82f6; --r32: #10b981; --zhuidian: #f59e0b;
  --color-up: #10b981; --color-down: #ef4444;
  --font-mono: "SF Mono", "Consolas", "Monaco", monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* 顶部 */
.topbar { height: 56px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.topbar-brand .back { color: var(--text-secondary); text-decoration: none; font-size: 13px; margin-right: 12px; transition: color 0.2s; }
.topbar-brand .back:hover { color: var(--text-primary); }
.topbar-meta { color: var(--text-secondary); font-size: 12px; }

/* 日期选择 */
.date-bar { padding: 16px 24px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-subtle); }
.date-bar select {
  background: var(--bg-surface); border: 1px solid var(--border-medium); color: var(--text-primary);
  padding: 6px 12px; border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 13px; cursor: pointer;
}

/* 汇总卡片 */
.summary-section { padding: 24px; }
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 1024px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr; } }
.summary-card {
  background: var(--bg-surface); border-radius: var(--radius-md); padding: 20px;
  border: 1px solid var(--border-subtle); text-align: center;
}
.summary-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.summary-card .value { font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
.summary-card .value.up { color: var(--color-up); }
.summary-card .value.down { color: var(--color-down); }
.summary-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* 策略复盘 */
.review-section { padding: 24px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 14px; font-weight: 600; }
.strategy-review {
  background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);
  margin-bottom: 16px; overflow: hidden;
}
.review-header {
  display: flex; align-items: center; justify-content: space-between; padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 0.2s;
}
.review-header:hover { background: var(--bg-hover); }
.review-header .name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.review-header .color-dot { width: 10px; height: 10px; border-radius: 50%; }
.review-header .pnl { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
.review-header .pnl.up { color: var(--color-up); }
.review-header .pnl.down { color: var(--color-down); }
.review-body { padding: 20px; display: none; }
.review-body.open { display: block; }
.review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .review-grid { grid-template-columns: 1fr; } }
.review-block { background: var(--bg-elevated); border-radius: var(--radius-md); padding: 16px; }
.review-block h4 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.review-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border-subtle); }
.review-row:last-child { border-bottom: none; }
.review-row .key { color: var(--text-secondary); }
.review-row .val { font-family: var(--font-mono); }
.review-row .val.up { color: var(--color-up); }
.review-row .val.down { color: var(--color-down); }

/* 交易记录 */
.trade-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.trade-table th { text-align: left; padding: 10px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-medium); }
.trade-table td { padding: 10px; border-bottom: 1px solid var(--border-subtle); }
.trade-table tr:hover { background: var(--bg-hover); }
.trade-table .code { font-family: var(--font-mono); font-weight: 600; }
.trade-table .up { color: var(--color-up); }
.trade-table .down { color: var(--color-down); }

/* 笔记区 */
.notes-section { padding: 24px; background: var(--bg-elevated); border-top: 1px solid var(--border-subtle); }
.notes-textarea {
  width: 100%; min-height: 120px; background: var(--bg-surface); border: 1px solid var(--border-medium);
  border-radius: var(--radius-md); padding: 16px; color: var(--text-primary); font-family: var(--font-sans);
  font-size: 14px; line-height: 1.6; resize: vertical;
}
.notes-textarea:focus { outline: none; border-color: var(--r32); }
.notes-actions { display: flex; gap: 12px; margin-top: 12px; }
.notes-actions button {
  padding: 8px 20px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: var(--font-sans);
}
.btn-primary { background: linear-gradient(135deg, var(--r32), #06b6d4); color: #0a0a0f; }
.btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
.btn-secondary { background: var(--bg-surface); border: 1px solid var(--border-medium); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <a href="index.html" class="back">← 返回监控面板</a>
    <span>盘后复盘中心</span>
  </div>
  <div class="topbar-meta">
    <span id="review-date">2026-06-08</span>
  </div>
</header>

<div class="date-bar">
  <div class="container">
    <select id="date-select" onchange="loadReview(this.value)">
      <option value="2026-06-08">2026-06-08 (今日)</option>
    </select>
  </div>
</div>

<!-- 汇总区 -->
<section class="summary-section">
  <div class="container">
    <div class="summary-grid" id="summary-grid">
      <!-- 动态填充 -->
    </div>
  </div>
</section>

<!-- 策略复盘 -->
<section class="review-section">
  <div class="container">
    <div class="section-header">
      <span class="section-title">策略复盘</span>
      <span style="font-size:12px;color:var(--text-muted)">点击展开详情</span>
    </div>
    <div id="strategy-reviews">
      <!-- 动态填充 -->
    </div>
  </div>
</section>

<!-- 交易记录 -->
<section class="review-section" style="background:var(--bg-elevated);border-top:1px solid var(--border-subtle)">
  <div class="container">
    <div class="section-header">
      <span class="section-title">全部交易记录</span>
    </div>
    <div style="overflow-x:auto">
      <table class="trade-table" id="all-trades">
        <thead>
          <tr>
            <th>时间</th><th>策略</th><th>操作</th><th>代码</th>
            <th>名称</th><th>数量</th><th>价格</th><th>金额</th>
          </tr>
        </thead>
        <tbody>
          <!-- 动态填充 -->
        </tbody>
      </table>
    </div>
  </div>
</section>

<!-- 笔记区 -->
<section class="notes-section">
  <div class="container">
    <div class="section-header">
      <span class="section-title">复盘笔记</span>
      <span style="font-size:12px;color:var(--text-muted)">仅本地保存</span>
    </div>
    <textarea class="notes-textarea" id="review-notes" placeholder="记录今日观察、策略表现反思、明日计划..."></textarea>
    <div class="notes-actions">
      <button class="btn-primary" onclick="saveNotes()">保存笔记</button>
      <button class="btn-secondary" onclick="exportReview()">导出复盘</button>
    </div>
  </div>
</section>

<script>
const API_BASE = 'http://localhost:8000/api/v1';
const STRATEGY_COLORS = { qixing: '#3b82f6', r32: '#10b981', zhuidian: '#f59e0b' };
const STRATEGY_NAMES = { qixing: '七星策略', r32: '三驾马车 R32', zhuidian: '追电策略' };

let reviewData = null;

async function loadReview(date) {
  document.getElementById('review-date').textContent = date;
  
  // 加载概览数据
  try {
    const res = await fetch(`${API_BASE}/dashboard/overview`);
    const result = await res.json();
    if (result.code === 0) {
      reviewData = result.data;
      renderSummary(result.data);
      renderStrategyReviews(result.data.strategies);
      renderAllTrades(result.data.strategies);
    }
  } catch (e) {
    console.error('复盘数据加载失败:', e);
    document.getElementById('strategy-reviews').innerHTML = `
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>数据服务未连接，请确认 real_data_server.py 已启动</p>
      </div>
    `;
  }
  
  // 加载本地笔记
  const notes = localStorage.getItem('review_notes_' + date);
  if (notes) document.getElementById('review-notes').value = notes;
}

function renderSummary(data) {
  const c = data.combined;
  const s = data.strategies;
  const totalTrades = s.reduce((sum, st) => sum + (st.trades_count || 0), 0);
  
  const best = s.reduce((a, b) => (a.today_return > b.today_return ? a : b));
  const worst = s.reduce((a, b) => (a.today_return < b.today_return ? a : b));
  
  const html = `
    <div class="summary-card">
      <div class="label">总资金</div>
      <div class="value ${c.total_return >= 0 ? 'up' : 'down'}">¥${c.total_asset.toLocaleString('zh-CN', {minimumFractionDigits:2})}</div>
      <div class="sub">初始 ¥30,000 · ${c.total_return >= 0 ? '+' : ''}${c.total_return}%</div>
    </div>
    <div class="summary-card">
      <div class="label">今日盈亏</div>
      <div class="value ${c.today_return >= 0 ? 'up' : 'down'}">${c.today_pnl >= 0 ? '+' : ''}¥${c.today_pnl.toFixed(2)}</div>
      <div class="sub">${c.today_return >= 0 ? '+' : ''}${c.today_return}%</div>
    </div>
    <div class="summary-card">
      <div class="label">交易笔数</div>
      <div class="value">${totalTrades}</div>
      <div class="sub">三策略合计</div>
    </div>
    <div class="summary-card">
      <div class="label">最佳 / 最差</div>
      <div class="value ${best.today_return >= 0 ? 'up' : 'down'}" style="font-size:20px">
        ${best.strategy_name} ${best.today_return >= 0 ? '+' : ''}${best.today_return}%
      </div>
      <div class="sub ${worst.today_return >= 0 ? 'up' : 'down'}">
        ${worst.strategy_name} ${worst.today_return >= 0 ? '+' : ''}${worst.today_return}%
      </div>
    </div>
  `;
  document.getElementById('summary-grid').innerHTML = html;
}

function renderStrategyReviews(strategies) {
  const container = document.getElementById('strategy-reviews');
  
  container.innerHTML = strategies.map(s => {
    const color = STRATEGY_COLORS[s.strategy_id];
    const pnlClass = s.today_return >= 0 ? 'up' : 'down';
    const holdingsHtml = (s.holdings || []).map(h => `
      <div class="review-row">
        <span class="key">${h.code} ${h.name}</span>
        <span class="val">${h.quantity}股 @ ¥${h.cost_price}</span>
      </div>
    `).join('');
    
    return `
      <div class="strategy-review">
        <div class="review-header" onclick="toggleReview('${s.strategy_id}')">
          <div class="name">
            <span class="color-dot" style="background:${color}"></span>
            ${s.strategy_name}
          </div>
          <div class="pnl ${pnlClass}">${s.today_return >= 0 ? '+' : ''}${s.today_return}%</div>
        </div>
        <div class="review-body" id="review-${s.strategy_id}">
          <div class="review-grid">
            <div class="review-block">
              <h4>持仓明细</h4>
              ${holdingsHtml || '<div style="color:var(--text-muted);font-size:13px">无持仓</div>'}
            </div>
            <div class="review-block">
              <h4>关键指标</h4>
              <div class="review-row"><span class="key">总资产</span><span class="val">¥${s.total_asset.toFixed(2)}</span></div>
              <div class="review-row"><span class="key">今日盈亏</span><span class="val ${pnlClass}">${s.today_pnl >= 0 ? '+' : ''}¥${s.today_pnl.toFixed(2)}</span></div>
              <div class="review-row"><span class="key">现金余额</span><span class="val">¥${s.cash.toFixed(2)}</span></div>
              <div class="review-row"><span class="key">仓位比例</span><span class="val">${(s.position_ratio * 100).toFixed(1)}%</span></div>
              <div class="review-row"><span class="key">交易笔数</span><span class="val">${s.trades_count}</span></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleReview(sid) {
  const el = document.getElementById('review-' + sid);
  el.classList.toggle('open');
}

async function renderAllTrades(strategies) {
  const tbody = document.querySelector('#all-trades tbody');
  let allTrades = [];
  
  for (const s of strategies) {
    try {
      const res = await fetch(`${API_BASE}/${s.strategy_id}/today_actions`);
      const result = await res.json();
      if (result.code === 0) {
        (result.data.trades || []).forEach(t => {
          allTrades.push({ ...t, strategy: s.strategy_name, strategy_id: s.strategy_id });
        });
      }
    } catch (e) {}
  }
  
  allTrades.sort((a, b) => a.time.localeCompare(b.time));
  
  tbody.innerHTML = allTrades.map(t => {
    const color = STRATEGY_COLORS[t.strategy_id];
    return `
      <tr>
        <td>${t.time}</td>
        <td><span style="color:${color};font-weight:600">${t.strategy}</span></td>
        <td class="${t.action === 'buy' ? 'up' : 'down'}">${t.action.toUpperCase()}</td>
        <td class="code">${t.code}</td>
        <td>${ETF_NAMES[t.code] || ''}</td>
        <td>${t.qty.toLocaleString()}</td>
        <td>¥${t.price}</td>
        <td>¥${t.amount.toFixed(2)}</td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:20px">今日无交易</td></tr>';
}

const ETF_NAMES = {
  '159915': '创业板ETF', '159967': '国企红利', '513100': '纳指ETF',
  '513520': '日经ETF', '513500': '标普500', '510300': '沪深300'
};

function saveNotes() {
  const date = document.getElementById('review-date').textContent;
  const notes = document.getElementById('review-notes').value;
  localStorage.setItem('review_notes_' + date, notes);
  alert('笔记已保存到本地');
}

function exportReview() {
  const date = document.getElementById('review-date').textContent;
  const notes = document.getElementById('review-notes').value;
  
  let text = `盘后复盘报告 - ${date}\n`;
  text += '='.repeat(40) + '\n\n';
  
  if (reviewData) {
    const c = reviewData.combined;
    text += `【汇总】\n`;
    text += `总资金: ¥${c.total_asset} (${c.total_return >= 0 ? '+' : ''}${c.total_return}%)\n`;
    text += `今日盈亏: ${c.today_pnl >= 0 ? '+' : ''}¥${c.today_pnl} (${c.today_return >= 0 ? '+' : ''}${c.today_return}%)\n\n`;
    
    text += `【策略表现】\n`;
    reviewData.strategies.forEach(s => {
      text += `${s.strategy_name}: ${s.today_return >= 0 ? '+' : ''}${s.today_return}% (¥${s.today_pnl})\n`;
    });
    text += '\n';
  }
  
  if (notes) {
    text += `【笔记】\n${notes}\n`;
  }
  
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `复盘_${date}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// 初始化
window.addEventListener('DOMContentLoaded', () => {
  loadReview('2026-06-08');
});
</script>

</body>
</html>
